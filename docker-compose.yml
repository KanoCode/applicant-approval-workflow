version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: approval_user
      POSTGRES_PASSWORD: approval_pass
      POSTGRES_DB: approval_db
    ports:
      - "5432:5432"
    volumes:
      - approval_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U approval_user -d approval_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://approval_user:approval_pass@db:5432/approval_db?schema=public"
      JWT_SECRET: "dev-only-secret-change-me"
      JWT_EXPIRES_IN: "8h"
      PORT: 4000
      UPLOAD_DIR: uploads
      MAX_UPLOAD_BYTES: 5242880
      NODE_ENV: production
    ports:
      - "4000:4000"
    volumes:
      - approval_uploads:/app/uploads

volumes:
  approval_db_data:
  approval_uploads:
